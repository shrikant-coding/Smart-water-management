<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💧 Smart Water Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1d3557,#457b9d,#a8dadc);
  color:white;
}

/* Header */
header {
  text-align:center;
  padding:25px;
  font-size:24px;
  font-weight:bold;
}

/* Grid */
.container {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:20px;
}

/* Glass Cards */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius:15px;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  transition:0.3s;
  transform:translateY(20px);
  opacity:0;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
}

/* Inputs */
input,select,button {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button {
  background:#00b4d8;
  color:white;
  cursor:pointer;
}

button:hover { background:#0077b6; }

/* KPI Cards */
.kpi {
  text-align:center;
  font-size:20px;
}

.kpi span {
  font-size:30px;
  font-weight:bold;
  display:block;
}

/* Circular Progress */
.circle {
  width:120px;
  height:120px;
  border-radius:50%;
  background: conic-gradient(#00f5d4 0%, #444 0%);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
}

.circle span {
  font-size:20px;
}

/* Lists */
li {
  display:flex;
  justify-content:space-between;
  padding:6px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

/* Chart */
canvas { background:white; border-radius:10px; }

/* Tips */
.tips {
  background:rgba(0,255,200,0.2);
  padding:10px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<header>💧 Smart Wastewater Dashboard</header>

<div class="container">

<!-- KPI -->
<div class="card kpi">
Fresh Water
<span id="total">0</span>
</div>

<div class="card kpi">
Reuse Water
<span id="reuseTotal">0</span>
</div>

<div class="card kpi">
Net Usage
<span id="netUsage">0</span>
</div>

<!-- Circular Progress -->
<div class="card">
<h3 style="text-align:center">Reuse %</h3>
<div class="circle" id="circle"><span id="percent">0%</span></div>
</div>

<!-- Forms -->
<div class="card">
<h3>Add Usage</h3>
<form id="usageForm">
<input type="number" id="amount" placeholder="Liters" required>
<select id="category">
<option>Drinking</option><option>Cooking</option>
<option>Cleaning</option><option>Gardening</option>
</select>
<button>Add</button>
</form>
</div>

<div class="card">
<h3>Add Reuse</h3>
<form id="reuseForm">
<input type="number" id="reuseAmount" placeholder="Liters" required>
<select id="reuseCategory">
<option>RO</option><option>Laundry</option>
<option>Rainwater</option><option>Kitchen</option>
</select>
<button>Add</button>
</form>
</div>

<!-- Lists -->
<div class="card"><h3>Usage</h3><ul id="usageList"></ul></div>
<div class="card"><h3>Reuse</h3><ul id="reuseList"></ul></div>

<!-- Chart -->
<div class="card"><canvas id="chart"></canvas></div>

<!-- Tips -->
<div class="card"><div id="tipsBox" class="tips"></div></div>

</div>

<script>
let usageData = JSON.parse(localStorage.getItem('usageData')) || [];
let reuseData = JSON.parse(localStorage.getItem('reuseData')) || [];

const chart = new Chart(document.getElementById('chart'), {
type:'doughnut',
data:{ labels:['Fresh','Reuse'], datasets:[{data:[0,0]}] }
});

function save(){
localStorage.setItem('usageData',JSON.stringify(usageData));
localStorage.setItem('reuseData',JSON.stringify(reuseData));
}

function animate(el,end){
let start=0;
let step=()=>{
start += end/20;
if(start>=end) start=end;
el.innerText=Math.floor(start);
if(start<end) requestAnimationFrame(step);
};
step();
}

function load(){
let total=0,reuseTotal=0;

usageData.forEach(e=> total+=e.amount);
reuseData.forEach(e=> reuseTotal+=e.amount);

animate(totalEl,total);
animate(reuseEl,reuseTotal);
animate(netEl,total-reuseTotal);

// Chart
chart.data.datasets[0].data=[total,reuseTotal];
chart.update();

// Circular Progress
let percent = total? (reuseTotal/total*100):0;
circle.style.background=`conic-gradient(#00f5d4 ${percent}%, #444 ${percent}%)`;
percentEl.innerText=Math.floor(percent)+"%";

// Tips
if(percent>50) tipsBox.innerText="🌟 Excellent water reuse!";
else if(percent>20) tipsBox.innerText="👍 Good progress!";
else tipsBox.innerText="⚠️ Improve reuse habits.";

// Lists
usageList.innerHTML='';
reuseList.innerHTML='';

usageData.forEach(e=>{
let li=document.createElement('li');
li.innerText=`${e.amount}L - ${e.category}`;
usageList.appendChild(li);
});

reuseData.forEach(e=>{
let li=document.createElement('li');
li.innerText=`${e.amount}L - ${e.category}`;
reuseList.appendChild(li);
});
}

// Forms
usageForm.onsubmit=e=>{
e.preventDefault();
usageData.push({amount:+amount.value,category:category.value});
save(); load(); usageForm.reset();
};

reuseForm.onsubmit=e=>{
e.preventDefault();
reuseData.push({amount:+reuseAmount.value,category:reuseCategory.value});
save(); load(); reuseForm.reset();
};

// Animations
gsap.from("header",{y:-50,opacity:0,duration:1});
gsap.to(".card",{opacity:1,y:0,stagger:0.15,duration:0.8});

// Init refs
const totalEl=document.getElementById('total');
const reuseEl=document.getElementById('reuseTotal');
const netEl=document.getElementById('netUsage');
const percentEl=document.getElementById('percent');
const circle=document.getElementById('circle');
const tipsBox=document.getElementById('tipsBox');
const usageList=document.getElementById('usageList');
const reuseList=document.getElementById('reuseList');

load();
</script>

</body>
</html>
