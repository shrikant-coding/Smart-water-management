<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>♻️ Wastewater Reuse Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f9fb; }
header { background:#0077b6; color:white; padding:20px; text-align:center; }
.container { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
input,select,button { width:100%; padding:8px; margin:5px 0; }
button { background:#0077b6; color:white; border:none; cursor:pointer; }
button:hover { background:#023e8a; }
li { padding:5px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; }
.actions button { width:auto; margin-left:5px; padding:4px 6px; }
.tips { background:#d8f3dc; padding:10px; border-radius:8px; }
</style>
</head>

<body>

<header>
<h1>💧♻️ Wastewater Reuse Tracker</h1>
</header>

<div class="container">

<!-- Usage -->
<div class="card">
<h2>Add Fresh Water</h2>
<form id="usageForm">
<input type="number" id="amount" placeholder="Liters" required>
<select id="category">
<option>Drinking</option><option>Cooking</option>
<option>Cleaning</option><option>Gardening</option>
</select>
<button>Add</button>
</form>
</div>

<!-- Reuse -->
<div class="card">
<h2>Add Reuse</h2>
<form id="reuseForm">
<input type="number" id="reuseAmount" placeholder="Liters" required>
<select id="reuseCategory">
<option>RO Wastewater</option>
<option>Laundry</option>
<option>Rainwater</option>
<option>Kitchen</option>
</select>
<button>Add</button>
</form>
</div>

<!-- Lists -->
<div class="card"><h3>Usage</h3><ul id="usageList"></ul></div>
<div class="card"><h3>Reuse</h3><ul id="reuseList"></ul></div>

<!-- Totals -->
<div class="card">
<h3>Totals</h3>
<p id="total"></p>
<p id="reuseTotal"></p>
<p id="netUsage"></p>
</div>

<!-- Chart -->
<div class="card">
<canvas id="chart"></canvas>
</div>

<!-- Analytics -->
<div class="card">
<h3>📅 Analytics</h3>
<p id="daily"></p>
<p id="monthly"></p>
</div>

<!-- Tips -->
<div class="card">
<h3>Tips</h3>
<div id="tipsBox" class="tips"></div>
</div>

</div>

<script>
const usageForm = document.getElementById('usageForm');
const reuseForm = document.getElementById('reuseForm');

let usageData = JSON.parse(localStorage.getItem('usageData')) || [];
let reuseData = JSON.parse(localStorage.getItem('reuseData')) || [];

// Chart
const chart = new Chart(document.getElementById('chart'), {
type:'bar',
data:{ labels:['Fresh','Reuse'], datasets:[{data:[0,0]}] }
});

// Utility
function save() {
localStorage.setItem('usageData', JSON.stringify(usageData));
localStorage.setItem('reuseData', JSON.stringify(reuseData));
}

function now() {
return new Date().toISOString();
}

// Load UI
function load() {
let total=0, reuseTotal=0;

const usageList = document.getElementById('usageList');
const reuseList = document.getElementById('reuseList');

usageList.innerHTML='';
reuseList.innerHTML='';

usageData.forEach((e,i)=>{
total+=e.amount;
usageList.appendChild(createItem(e,i,'usage'));
});

reuseData.forEach((e,i)=>{
reuseTotal+=e.amount;
reuseList.appendChild(createItem(e,i,'reuse'));
});

// Totals
document.getElementById('total').innerText=`Fresh: ${total}`;
document.getElementById('reuseTotal').innerText=`Reuse: ${reuseTotal}`;
document.getElementById('netUsage').innerText=`Net: ${total-reuseTotal}`;

// Chart
chart.data.datasets[0].data=[total,reuseTotal];
chart.update();

// Tips
const percent = total? (reuseTotal/total*100):0;
const tipsBox = document.getElementById('tipsBox');

if(percent>50) tipsBox.innerText="Excellent reuse!";
else if(percent>20) tipsBox.innerText="Good, improve more.";
else tipsBox.innerText="Start reusing water.";

// Analytics
updateAnalytics();
}

// Create list item with edit/delete
function createItem(entry,index,type) {
const li=document.createElement('li');

const text=document.createElement('span');
text.innerText=`${entry.amount}L - ${entry.category}`;
li.appendChild(text);

const actions=document.createElement('div');
actions.className='actions';

// Delete
const del=document.createElement('button');
del.innerText='❌';
del.onclick=()=>{
if(type==='usage') usageData.splice(index,1);
else reuseData.splice(index,1);
save(); load();
};

// Edit
const edit=document.createElement('button');
edit.innerText='✏️';
edit.onclick=()=>{
const newVal=prompt("Enter new amount",entry.amount);
if(newVal){
entry.amount=parseFloat(newVal);
save(); load();
}
};

actions.appendChild(edit);
actions.appendChild(del);
li.appendChild(actions);

return li;
}

// Analytics logic
function updateAnalytics() {
const today = new Date().toISOString().slice(0,10);
const month = today.slice(0,7);

let daily=0, monthly=0;

usageData.forEach(e=>{
if(e.time?.startsWith(today)) daily+=e.amount;
if(e.time?.startsWith(month)) monthly+=e.amount;
});

document.getElementById('daily').innerText=`Today Usage: ${daily}`;
document.getElementById('monthly').innerText=`Monthly Usage: ${monthly}`;
}

// Add usage
usageForm.onsubmit=e=>{
e.preventDefault();
const amt=parseFloat(amount.value);
if(amt>0){
usageData.push({amount:amt,category:category.value,time:now()});
save(); load();
usageForm.reset();
}
};

// Add reuse
reuseForm.onsubmit=e=>{
e.preventDefault();
const amt=parseFloat(reuseAmount.value);
if(amt>0){
reuseData.push({amount:amt,category:reuseCategory.value,time:now()});
save(); load();
reuseForm.reset();
}
};

// Init
load();
</script>

</body>
</html>
