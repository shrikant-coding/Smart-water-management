<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>💧 Water Usage Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #caf0f8, #ade8f4);
      margin: 0;
      padding: 0;
      animation: fadeIn 1.5s ease-in-out;
    }
    header {
      background: linear-gradient(135deg, #0077b6, #00b4d8);
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    header h1 {
      margin: 0;
      font-size: 2.5em;
      letter-spacing: 2px;
    }
    main {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
    .card {
      background: white;
      padding: 20px;
      margin-bottom: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: scale(1.02);
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input, select, button {
      margin-top: 5px;
      padding: 10px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1em;
    }
    button {
      background: #0077b6;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #023e8a;
    }
    .usage-list {
      list-style: none;
      padding: 0;
    }
    .usage-list li {
      background: #e0f7fa;
      margin: 8px 0;
      padding: 12px;
      border-radius: 6px;
      font-size: 1.1em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn 0.5s ease;
    }
    .tips {
      background: #d8f3dc;
      padding: 15px;
      border-radius: 8px;
      font-size: 1.1em;
      font-style: italic;
      animation: pulse 2s infinite;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    @keyframes slideIn {
      from {transform: translateX(-20px); opacity: 0;}
      to {transform: translateX(0); opacity: 1;}
    }
    @keyframes pulse {
      0% {background-color: #d8f3dc;}
      50% {background-color: #b7e4c7;}
      100% {background-color: #d8f3dc;}
    }
  </style>
</head>
<body>
  <header>
    <h1>💧 Water Usage Tracker</h1>
    <p>Track, visualize, and save water creatively</p>
  </header>

  <main>
    <!-- Add Usage -->
    <div class="card">
      <h2>➕ Add Usage</h2>
      <form id="usageForm">
        <label for="amount">Amount (liters):</label>
        <input type="number" id="amount" required>

        <label for="category">Category:</label>
        <select id="category">
          <option>🥤 Drinking</option>
          <option>🍳 Cooking</option>
          <option>🧽 Cleaning</option>
          <option>🌱 Gardening</option>
        </select>

        <button type="submit">Add Entry</button>
      </form>
    </div>

    <!-- Usage History -->
    <div class="card">
      <h2>📜 Usage History</h2>
      <ul id="usageList" class="usage-list"></ul>
    </div>

    <!-- Total Consumption -->
    <div class="card">
      <h2>📊 Total Consumption</h2>
      <p id="total">0 liters</p>
    </div>

    <!-- Graphs -->
    <div class="card">
      <h2>📈 Usage Trends</h2>
      <canvas id="usageChart"></canvas>
    </div>

    <!-- Suggestions -->
    <div class="card">
      <h2>💡 Water Saving Tips</h2>
      <div class="tips" id="tipsBox">
        <p>🌧 Collect rainwater for gardening.</p>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('usageForm');
    const usageList = document.getElementById('usageList');
    const totalDisplay = document.getElementById('total');
    const tipsBox = document.getElementById('tipsBox');
    let total = 0;
    let usageData = JSON.parse(localStorage.getItem('usageData')) || [];

    // Chart setup
    const ctx = document.getElementById('usageChart').getContext('2d');
    const usageChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: usageData.map(entry => entry.category),
        datasets: [{
          label: 'Water Usage (liters)',
          data: usageData.map(entry => entry.amount),
          backgroundColor: ['#0077b6','#00b4d8','#90e0ef','#48cae4']
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'bottom' }
        }
      }
    });

    // Load existing data
    function loadData() {
      usageList.innerHTML = '';
      total = 0;
      usageData.forEach(entry => {
        total += entry.amount;
        const li = document.createElement('li');
        li.textContent = entry.amount + " liters - " + entry.category;
        usageList.appendChild(li);
      });
      totalDisplay.textContent = total + " liters";
      updateChart();
      showTip();
    }

    // Update chart
    function updateChart() {
      usageChart.data.labels = usageData.map(entry => entry.category);
      usageChart.data.datasets[0].data = usageData.map(entry => entry.amount);
      usageChart.update();
    }

    // Show tips based on usage
    function showTip() {
      if (total > 100) {
        tipsBox.innerHTML = "<p>⚠️ High usage! Reuse wastewater for plants.</p>";
      } else if (total > 50) {
        tipsBox.innerHTML = "<p>💡 Moderate usage. Try bucket baths instead of showers.</p>";
      } else {
        tipsBox.innerHTML = "<p>✅ Great job! Keep conserving water.</p>";
      }
    }

    // Add new entry
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const amount = parseFloat(document.getElementById('amount').value);
      const category = document.getElementById('category').value;

      if (!isNaN(amount) && amount > 0) {
        const entry = { amount, category };
        usageData.push(entry);
        localStorage.setItem('usageData', JSON.stringify(usageData));
        loadData();
        form.reset();
      }
    });

    // Initialize
    loadData();
  </script>
</body>
</html>
