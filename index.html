<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>♻️ Wastewater Reuse Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f9fb; }
header { background:#0077b6; color:white; padding:20px; text-align:center; }

.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
  transform: translateY(20px);
  opacity:0;
}

input,select,button {
  width:100%;
  padding:8px;
  margin:5px 0;
}

button {
  background:#0077b6;
  color:white;
  border:none;
  cursor:pointer;
  transition: transform 0.2s ease, background 0.3s;
}

button:hover {
  background:#023e8a;
  transform: scale(1.05);
}

li {
  padding:5px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  opacity:0;
}

.actions button {
  width:auto;
  margin-left:5px;
  padding:4px 6px;
}

/* Progress Bar */
.progress {
  height: 15px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#00b4d8,#90dbf4);
}
</style>
</head>

<body>

<header>
<h1>💧♻️ Wastewater Reuse Tracker</h1>
</header>

<div class="container">

<div class="card">
<h3>Add Usage</h3>
<form id="usageForm">
<input type="number" id="amount" placeholder="Liters" required>
<select id="category">
<option>Drinking</option>
<option>Cooking</option>
<option>Cleaning</option>
<option>Gardening</option>
</select>
<button>Add</button>
</form>
</div>

<div class="card">
<h3>Add Reuse</h3>
<form id="reuseForm">
<input type="number" id="reuseAmount" placeholder="Liters" required>
<select id="reuseCategory">
<option>RO</option>
<option>Laundry</option>
<option>Rainwater</option>
<option>Kitchen</option>
</select>
<button>Add</button>
</form>
</div>

<div class="card"><h3>Usage</h3><ul id="usageList"></ul></div>
<div class="card"><h3>Reuse</h3><ul id="reuseList"></ul></div>

<div class="card">
<h3>Totals</h3>
<p id="total"></p>
<p id="reuseTotal"></p>
<p id="netUsage"></p>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Tips</h3>
<div id="tipsBox"></div>
</div>

</div>

<script>
const usageForm = document.getElementById('usageForm');
const reuseForm = document.getElementById('reuseForm');

let usageData = JSON.parse(localStorage.getItem('usageData')) || [];
let reuseData = JSON.parse(localStorage.getItem('reuseData')) || [];

const chart = new Chart(document.getElementById('chart'), {
type:'bar',
data:{ labels:['Fresh','Reuse'], datasets:[{data:[0,0]}] }
});

function save(){
localStorage.setItem('usageData',JSON.stringify(usageData));
localStorage.setItem('reuseData',JSON.stringify(reuseData));
}

function animateValue(el,start,end,duration){
let startTime=null;
function step(t){
if(!startTime) startTime=t;
let progress=t-startTime;
let value=Math.min(start+(end-start)*(progress/duration),end);
el.innerText=Math.floor(value);
if(progress<duration) requestAnimationFrame(step);
}
requestAnimationFrame(step);
}

function load(){
let total=0,reuseTotal=0;

const usageList=document.getElementById('usageList');
const reuseList=document.getElementById('reuseList');

usageList.innerHTML='';
reuseList.innerHTML='';

usageData.forEach((e,i)=>{
total+=e.amount;
let li=createItem(e,i,'usage');
usageList.appendChild(li);
gsap.to(li,{opacity:1,y:0,duration:0.5});
});

reuseData.forEach((e,i)=>{
reuseTotal+=e.amount;
let li=createItem(e,i,'reuse');
reuseList.appendChild(li);
gsap.to(li,{opacity:1,y:0,duration:0.5});
});

// Animated numbers
animateValue(totalEl,0,total,800);
animateValue(reuseEl,0,reuseTotal,800);
animateValue(netEl,0,total-reuseTotal,800);

// Chart
chart.data.datasets[0].data=[total,reuseTotal];
chart.update();

// Progress bar animation
const percent = total? (reuseTotal/total*100):0;
gsap.to("#progressBar",{width:percent+"%",duration:1});

// Tips
const tipsBox=document.getElementById('tipsBox');
if(percent>50) tipsBox.innerText="🔥 Excellent reuse!";
else if(percent>20) tipsBox.innerText="👍 Good progress";
else tipsBox.innerText="⚠️ Start reusing water";
}

function createItem(entry,index,type){
const li=document.createElement('li');

const span=document.createElement('span');
span.innerText=`${entry.amount}L - ${entry.category}`;
li.appendChild(span);

const actions=document.createElement('div');

const del=document.createElement('button');
del.innerText='❌';
del.onclick=()=>{
if(type==='usage') usageData.splice(index,1);
else reuseData.splice(index,1);
save(); load();
};

const edit=document.createElement('button');
edit.innerText='✏️';
edit.onclick=()=>{
let val=prompt("Edit value",entry.amount);
if(val){ entry.amount=parseFloat(val); save(); load();}
};

actions.appendChild(edit);
actions.appendChild(del);
li.appendChild(actions);

return li;
}

// Forms
usageForm.onsubmit=e=>{
e.preventDefault();
let amt=parseFloat(amount.value);
if(amt>0){
usageData.push({amount:amt,category:category.value});
save(); load(); usageForm.reset();
}
};

reuseForm.onsubmit=e=>{
e.preventDefault();
let amt=parseFloat(reuseAmount.value);
if(amt>0){
reuseData.push({amount:amt,category:reuseCategory.value});
save(); load(); reuseForm.reset();
}
};

// Initial animations
gsap.from("header",{y:-50,opacity:0,duration:1});
gsap.to(".card",{opacity:1,y:0,stagger:0.2,duration:0.8});

// Init
const totalEl=document.getElementById('total');
const reuseEl=document.getElementById('reuseTotal');
const netEl=document.getElementById('netUsage');

load();
</script>

</body>
</html>
